<body>
    <header>
        <img src="img/logo.png" width="300" height="100" alt="Makalla logo">

    <main>
        <h2>Be The Reason a Star believes!</h2>
        <button> <a href="volunteer.html" class="back-btn">back</a></button>
        <section>
            <h3>Volunteer Form</h3>

            <form id="volunteerForm">
                <ul>
                    <li><label>Full Name & Surname *</label></li>
                    <input type="text" id="volName" placeholder="Your answer">

                    <li><label>Phone / WhatsApp Number *</label></li>
                    <input type="tel" id="volPhone" placeholder="Your answer">

                    <li><label>Email Address *</label></li>
                    <input type="email" id="volEmail" placeholder="Your answer">

                    <li><label>Why do you want to volunteer? *</label></li>
                    <textarea id="volMessage" placeholder="Your answer"></textarea>

                    <li><button type="submit">Submit Application</button></li>
                </ul>
                <p id="volError"></p>
            </form>
        </section>

        </section>
